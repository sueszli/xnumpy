import lit.formats
import os

config.test_source_root = os.path.dirname(__file__)
exo_src = os.path.dirname(os.path.dirname(config.test_source_root))

config.name = "exo-mlir"
config.test_format = lit.formats.ShTest(preamble_commands=[f"cd {exo_src}"])
config.suffixes = [".py"]

config.substitutions.append(("FILECHECK-LLVM", f"uv run exomlir --target llvm -o - %s | filecheck %s"))
config.substitutions.append(("FILECHECK-SCF", f"uv run exomlir --target scf -o - %s | filecheck %s"))
config.substitutions.append(("FILECHECK-EXO", f"uv run exomlir --target exo -o - %s | filecheck %s"))
